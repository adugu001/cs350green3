/*
// Apply the java plugin to add support for Java
apply plugin: 'java'

// In this section you declare where to find the dependencies of your project
repositories {
    // Use 'jcenter' for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

// In this section you declare the dependencies for your production and test code
dependencies {
    // The production code uses the SLF4J logging API at compile time
    compile 'org.slf4j:slf4j-api:1.7.25'

    // Declare the dependency for your favourite test framework you want to use in your tests.
    // TestNG is also supported by the Gradle Test task. Just change the
    // testCompile dependency to testCompile 'org.testng:testng:6.8.1' and add
    // 'test.useTestNG()' to your build script.
    testCompile 'junit:junit:4.12'
}
*/

plugins {
    // Provides support for building Java projects
    id 'java'
    // Optional: Adds a 'run' task if you have a main class
    id 'application' 
}

group = 'edu.odu.cs.cs350'
version = '1.0-SNAPSHOT'

repositories {
    // Where Gradle looks for libraries (JUnit, etc.)
    mavenCentral()
}

dependencies {
    // Testing framework
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    
    // Runtime for JUnit 5
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    // Set your Java version (17 or 21 are common standards now)
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class so you can use './gradlew run'
    mainClass = 'edu.odu.cs.cs350.HelloWorld'
}

test {
    // Use JUnit 5 for unit tests
    useJUnitPlatform()
}