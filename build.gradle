plugins {
    id 'java'
    id 'application' 
}

group = 'edu.odu.cs.cs350'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}


application {
    mainClass = 'edu.odu.cs.cs350.CodeComp'
}
